name: NodeJS Quality

on:
  workflow_call:
    inputs:
      working_directory:
        required: false
        type: string
        default: '.'
      node_version:
        required: false
        type: string
        default: '22'
      auto_patch:
        required: false
        type: boolean
        default: true
      enable_secrets:
        required: false
        type: boolean
        default: true

jobs:
  secure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        if: inputs.enable_secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: OSV Scan
        run: |
          curl -sL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner scan source -r . || true
          rm osv-scanner

  linting:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Biome Lint
        run: npx @biomejs/biome check .
      - name: Type Check
        run: npx tsc --noEmit

  # Adding OSV Fix back to maintain the auto_patch functionality on main
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: inputs.auto_patch && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: OSV Scanner Fix
        run: |
          curl -L https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner fix --non-interactive --strategy=in-place -L package-lock.json
          rm osv-scanner
          npm install
      - name: Commit Security Patches
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix(deps): patch vulnerabilities via osv-scanner"
          file_pattern: 'package.json package-lock.json'
          commit_options: '--no-verify'
