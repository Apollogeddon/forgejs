name: NodeJS Quality

on:
  workflow_call:
    inputs:
      working_directory:
        required: false
        type: string
        default: '.'
      node_version:
        required: false
        type: string
        default: '22'
      auto_patch:
        required: false
        type: boolean
        default: false
      enable_secrets:
        required: false
        type: boolean
        default: true

jobs:
  setup:
    uses: ./.github/workflows/default.yml
    with:
      node_version: ${{ inputs.node_version }}
      working_directory: ${{ inputs.working_directory }}

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup]
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        if: inputs.enable_secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: OSV Scanner Fix
        if: inputs.auto_patch && github.ref == 'refs/heads/main'
        run: |
          curl -L https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner fix --non-interactive --strategy=in-place -L package-lock.json
          rm osv-scanner
          npm install
      - name: Commit Security Patches
        if: inputs.auto_patch && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix(deps): patch vulnerabilities via osv-scanner"
          file_pattern: 'package.json package-lock.json'
      - name: Biome Lint
        run: npx @biomejs/biome check .
      - name: Astro Sync
        run: |
          if [ -f astro.config.mjs ]; then
            npx astro sync
          fi
      - name: Type Check
        run: npx tsc --noEmit

  osv-scan:
    needs: [setup]
    permissions:
      actions: read
      security-events: write
      contents: read
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8"
    with:
      fail-on-vuln: true
      upload-sarif: true