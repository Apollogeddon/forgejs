name: NodeJS Debian

on:
  workflow_call:
    inputs:
      artifact_name:
        required: false
        type: string
        default: 'dist'
      enable_secrets:
        required: false
        type: boolean
        default: true
      node_version:
        required: false
        type: string
        default: '22'
      working_directory:
        required: false
        type: string
        default: '.'

jobs:
  version:
    uses: ./.github/workflows/version.yml
    with:
      enable_secrets: ${{ inputs.enable_secrets }}
      node_version: ${{ inputs.node_version }}
      working_directory: ${{ inputs.working_directory }}

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [version]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.working_directory }}/dist
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Debian Package
        run: |
          # Copy env file if exists, otherwise ignore
          if [ -f .env.production ]; then
            cp .env.production .env
          else
            echo "No .env.production found"
          fi
          
          # Run the debian build command
          npx snodeb
          
          # Move artifacts to a distinct directory for upload
          mkdir -p deb_output
          mv ./deb/*.deb ./deb_output/
      - name: Upload Debian Artifact
        uses: actions/upload-artifact@v5
        with:
          name: debian-package
          path: ${{ inputs.working_directory }}/deb_output/*.deb
