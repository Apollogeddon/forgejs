name: NodeJS Version

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '22'
      working_directory:
        required: false
        type: string
        default: '.'
    outputs:
      new_release_published:
        description: "Whether a new release was published"
        value: ${{ format('{0}', jobs.release-please.outputs.release_created == 'true' || jobs.release-please.outputs.release_created == true || jobs.release-please.outputs.releases_created == 'true' || jobs.release-please.outputs.releases_created == true) }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}
