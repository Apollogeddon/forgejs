name: NodeJS Tests

on:
  workflow_call:
    inputs:
      working_directory:
        required: false
        type: string
        default: '.'
      node_version:
        required: false
        type: string
        default: '22'
      enable_secrets:
        required: false
        type: boolean
        default: true
      auto_patch:
        required: false
        type: boolean
        default: true
      build_env_vars:
        required: false
        type: string
        default: ''

jobs:
  quality:
    uses: ./.github/workflows/quality.yml
    with:
      working_directory: ${{ inputs.working_directory }}
      node_version: ${{ inputs.node_version }}
      enable_secrets: ${{ inputs.enable_secrets }}

  testing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality]
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: "@${{ github.repository_owner }}"
      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Tests
        run: npm test
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: ${{ inputs.working_directory }}/coverage
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality, testing]
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: "@${{ github.repository_owner }}"
      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Inject Environment Variables
        if: inputs.build_env_vars != ''
        run: |
          cat << 'EOF' >> .env
          ${{ inputs.build_env_vars }}
          EOF
      - name: Build
        run: npm run build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: ${{ inputs.working_directory }}/dist

  patch:
    if: inputs.auto_patch && github.ref == 'refs/heads/main'
    needs: [quality, testing, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: "@${{ github.repository_owner }}"
      - name: OSV Scanner Fix
        run: |
          curl -L https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner fix --non-interactive --strategy=in-place -L package-lock.json
          rm osv-scanner
          npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit Security Patches
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "fix(deps): patch vulnerabilities via osv-scanner"
          file_pattern: 'package.json package-lock.json'
