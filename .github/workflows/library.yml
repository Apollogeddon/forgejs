name: NodeJS Library

on:
  workflow_call:
    inputs:
      artifact_name:
        required: false
        type: string
        default: 'dist'
      enable_secrets:
        required: false
        type: boolean
        default: true
      node_version:
        required: false
        type: string
        default: '22'
      working_directory:
        required: false
        type: string
        default: '.'
      environment_name:
        required: false
        type: string
        default: 'github-pages'
    secrets:
      NPM_TOKEN:
        required: false

jobs:
  version:
    uses: ./.github/workflows/version.yml
    with:
      enable_secrets: ${{ inputs.enable_secrets }}
      node_version: ${{ inputs.node_version }}
      working_directory: ${{ inputs.working_directory }}

  document:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [version]
    if: github.ref == 'refs/heads/main' && needs.version.outputs.new_release_published == 'true'
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Astro Sync
        run: npx astro sync
      - name: Generate Documentation
        run: npx astro build
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ inputs.working_directory }}/docs

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [version, document]
    if: github.ref == 'refs/heads/main' && needs.version.outputs.new_release_published == 'true'
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.working_directory }}/dist
      - uses: actions/download-artifact@v8
        with:
          name: updated-package-json
          path: ${{ inputs.working_directory }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: "@${{ github.repository_owner }}"
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: [version, document]
    if: github.ref == 'refs/heads/main' && needs.version.outputs.new_release_published == 'true'
    permissions:
      pages: write
      id-token: write
    environment:
      name: ${{ inputs.environment_name }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
