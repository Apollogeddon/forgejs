name: ForgeJS CI/CD

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testing:
    uses: ./.github/workflows/testing.yml
    with:
      node_version: '22'
      working_directory: '.'
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write

  library:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/library.yml
    needs: [testing]
    with:
      enable_secrets: false
      node_version: '22'
      working_directory: '.'
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
