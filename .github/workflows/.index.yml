name: ForgeJS CI/CD

on:
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "src/**"
      - "tests/**"
      - 'biome.json'
      - 'commitlint.config.cjs'
      - 'lefthook.yml'
      - 'snodeb.config.cjs'
      - 'tsup.config.cjs'
      - 'vitest.config.cjs'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - ".github/**"
      - "src/**"
      - "tests/**"
      - 'biome.json'
      - 'commitlint.config.cjs'
      - 'lefthook.yml'
      - 'snodeb.config.cjs'
      - 'tsup.config.cjs'
      - 'vitest.config.cjs'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testing:
    uses: ./.github/workflows/testing.yml
    with:
      node_version: '22'
      working_directory: '.'
    secrets: inherit
    permissions:
      contents: write
      issues: write
      pull-requests: write

  library:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/library.yml
    needs: [testing]
    with:
      enable_secrets: false
      node_version: '22'
      working_directory: '.'
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      issues: write
      packages: write
      pages: write
      pull-requests: write
